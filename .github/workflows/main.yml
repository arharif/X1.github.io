name: CI

on:
  pull_request:
  push:
    branches: ['main']

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          check-latest: false
      - run: npm ci
      - run: npm run build
      - run: npm run lint
